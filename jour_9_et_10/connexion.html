<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Connexion</title>
</head>

<body>
    
    <main>
        <form method="post">
            
            <div class="flex flex-col mt-25 mb-3 ml-130 mr-180">
                <label for="email" class="block text-sm font-medium text-gray-700">Email:</label>
                <input type="email" id="email" name="email" required class="border">
            </div>

            <div class="flex flex-col mb-3 ml-130 mr-180">
                <label for="password" class="block text-sm font-medium text-gray-700">Password:</label>
                <input type="password" id="password" name="password" required class="border">
            </div>

            <input type="submit" value="Se connecter" class="flex flex-col mb-3 ml-130 mr-180 border bg-teal-500 hover:bg-teal-600 active:bg-teal-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">

        </form>
    </main>

</body>
</html>
